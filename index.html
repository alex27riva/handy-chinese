<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hàndy</title>

<!-- PWA meta tags -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hàndy">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1208">
<link rel="manifest" href="./manifest.json">

<!-- Inline SVG favicon / app icon (red seal with 中) -->
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23c0392b'/><text x='90' y='128' font-size='110' text-anchor='middle' font-family='PingFang SC,sans-serif' font-weight='700' fill='%23f5efe3'>汉</text></svg>">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23c0392b'/><text x='90' y='128' font-size='110' text-anchor='middle' font-family='PingFang SC,sans-serif' font-weight='700' fill='%23f5efe3'>汉</text></svg>">

<link rel="stylesheet" href="./style.css">
</head>
<body>

<button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode"></button>
<div class="lang-switch" role="group" aria-label="Language">
  <button data-lang="en" type="button">EN</button>
  <button data-lang="it" type="button">IT</button>
</div>

<header>
  <div class="header-rule"></div>
  <h1>Hàndy</h1>
  <p class="subtitle" data-i18n="subtitle">Essential Chinese for apps, food, travel & visa-free destinations</p>
  <p class="subtitle" style="margin-top:0.1rem; font-size:0.75rem; color:var(--text-muted);" title="'hàn' (汉) = Chinese + 'handy' = useful">hàn + handy</p>
  <p class="subtitle" style="margin-top:0.3rem; font-size:0.8rem;" data-i18n="tapHint">🔊 Tap any card to hear it spoken</p>
</header>

<div class="install-hint" id="installHint">
  <span style="font-size:1.1rem;">📱</span>
  <span data-i18n-html="installHint"><strong>Works offline!</strong> Tap Safari's Share button → <strong>Add to Home Screen</strong> to install as an app. Perfect for your trip.</span>
  <button id="installBtn" class="install-btn" style="display:none" data-i18n="installBtnLabel">Install</button>
  <button class="close-hint" onclick="this.parentElement.style.display='none'; try{localStorage.setItem('hintDismissed','1')}catch(e){}">✕</button>
</div>

<div class="tabs" id="tabs" role="tablist"></div>
<div class="toolbar">
  <div class="search-wrap">
    <input type="search" id="searchInput" class="search-input" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <button class="fav-btn" id="favBtn" aria-label="View favorites" title="Favorites">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
  </button>
  <button class="pinyin-btn" id="pinyinBtn" aria-label="Toggle pinyin" title="Hide/show pinyin">拼</button>
</div>
<div id="panels"></div>


<div class="app-version" aria-hidden="true">v0.8.1</div>

<script>
  // Show install hint only on iOS/Android, hide if standalone or dismissed
  (function() {
    const hint = document.getElementById('installHint');
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                      || window.navigator.standalone === true;
    let dismissed = false;
    try { dismissed = localStorage.getItem('hintDismissed') === '1'; } catch(e) {}

    const ua = navigator.userAgent;
    const isIOS = /iphone|ipad|ipod/i.test(ua) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isAndroid = /android/i.test(ua);

    if (isStandalone || dismissed || (!isIOS && !isAndroid)) {
      hint.style.display = 'none';
      return;
    }

    if (isAndroid) {
      const textEl = hint.querySelector('[data-i18n-html]');
      if (textEl) textEl.dataset.i18nHtml = 'installHintAndroid';

      let deferredPrompt = null;
      const installBtn = document.getElementById('installBtn');

      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
        if (installBtn) installBtn.style.display = '';
      });

      if (installBtn) {
        installBtn.addEventListener('click', async () => {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;
          hint.style.display = 'none';
          try { localStorage.setItem('hintDismissed', '1'); } catch(e) {}
        });
      }

      window.addEventListener('appinstalled', () => {
        hint.style.display = 'none';
        try { localStorage.setItem('hintDismissed', '1'); } catch(e) {}
      });
    }
  })();

  const SPEAKER_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;

  const STAR_SVG = `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;

  const CHEVRON_SVG = `<svg class="collapse-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;

  const SUPPORTED_LANGS = ['en', 'it'];

  const FAVORITES_KEY = 'favorites';
  let favorites = new Set();
  try {
    const raw = localStorage.getItem(FAVORITES_KEY);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) favorites = new Set(arr);
    }
  } catch (e) {}

  const favoriteKey = (tabId, hanzi) => tabId + ':' + hanzi;
  const isFavorite = (tabId, hanzi) => favorites.has(favoriteKey(tabId, hanzi));
  function toggleFavorite(tabId, hanzi) {
    const key = favoriteKey(tabId, hanzi);
    if (favorites.has(key)) favorites.delete(key);
    else favorites.add(key);
    try { localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favorites])); } catch (e) {}
  }

  const COLLAPSED_KEY = 'collapsedGroups';
  let collapsedGroups = new Set();
  try {
    const raw = localStorage.getItem(COLLAPSED_KEY);
    if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr)) collapsedGroups = new Set(arr); }
  } catch (e) {}
  function collapseKey(tabId, titleObj) {
    return tabId + ':' + ((titleObj && titleObj.en) ? titleObj.en : String(titleObj));
  }
  function isCollapsed(tabId, titleObj) { return collapsedGroups.has(collapseKey(tabId, titleObj)); }
  function toggleCollapse(tabId, titleObj) {
    const key = collapseKey(tabId, titleObj);
    if (collapsedGroups.has(key)) collapsedGroups.delete(key); else collapsedGroups.add(key);
    try { localStorage.setItem(COLLAPSED_KEY, JSON.stringify([...collapsedGroups])); } catch (e) {}
  }

  const THEME_KEY = 'theme';
  let currentTheme = 'light';
  try {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'dark' || saved === 'light') currentTheme = saved;
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) currentTheme = 'dark';
  } catch (e) {}
  document.documentElement.dataset.theme = currentTheme;

  function setTheme(theme) {
    currentTheme = theme;
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
    const btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = theme === 'dark' ? '☀︎' : '☾';
  }

  const PINYIN_KEY = 'pinyinHidden';
  let pinyinHidden = false;
  try { pinyinHidden = localStorage.getItem(PINYIN_KEY) === '1'; } catch (e) {}
  if (pinyinHidden) document.documentElement.dataset.pinyin = 'hidden';

  function setPinyinMode(hidden) {
    pinyinHidden = hidden;
    if (hidden) document.documentElement.dataset.pinyin = 'hidden';
    else delete document.documentElement.dataset.pinyin;
    try { localStorage.setItem(PINYIN_KEY, hidden ? '1' : '0'); } catch (e) {}
    const btn = document.getElementById('pinyinBtn');
    if (btn) btn.classList.toggle('active', hidden);
  }

  const CHROME = {
    subtitle: {
      en: 'Essential Chinese for apps, food, travel & visa-free destinations',
      it: 'Cinese essenziale per app, cibo, viaggi e destinazioni senza visto'
    },
    tapHint: {
      en: '🔊 Tap any card to hear it spoken',
      it: '🔊 Tocca una carta per ascoltarla'
    },
    installHint: {
      en: '<strong>Works offline!</strong> Tap Safari\'s Share button → <strong>Add to Home Screen</strong> to install as an app. Perfect for your trip.',
      it: '<strong>Funziona offline!</strong> Tocca il pulsante Condividi di Safari → <strong>Aggiungi alla schermata Home</strong> per installarla come app. Perfetta per il tuo viaggio.'
    },
    installHintAndroid: {
      en: '<strong>Works offline!</strong> Tap <strong>Install</strong> or use your browser menu → <strong>Add to Home Screen</strong>.',
      it: '<strong>Funziona offline!</strong> Tocca <strong>Installa</strong> o usa il menu del browser → <strong>Aggiungi alla schermata Home</strong>.'
    },
    installBtnLabel: {
      en: 'Install',
      it: 'Installa'
    },
    favoritesLabel: {
      en: 'Favorites',
      it: 'Preferiti'
    },
    favoritesEmpty: {
      en: 'Tap the ☆ on any card to save it here.',
      it: 'Tocca la ☆ su una carta per salvarla qui.'
    },
    searchPlaceholder: {
      en: 'Search…',
      it: 'Cerca…'
    }
  };

  function detectInitialLang() {
    try {
      const stored = localStorage.getItem('lang');
      if (SUPPORTED_LANGS.includes(stored)) return stored;
    } catch (e) {}
    const nav = (navigator.language || 'en').toLowerCase();
    return nav.startsWith('it') ? 'it' : 'en';
  }

  let currentLang = detectInitialLang();
  let contentData = null;

  function t(field) {
    if (field == null) return '';
    if (typeof field === 'string') return field;
    return field[currentLang] || field.en || Object.values(field)[0] || '';
  }

  const fieldPrefix = cls => cls === 'phrase-card' ? 'phrase-' : '';
  const gridClass = cls => cls === 'phrase-card' ? 'phrase-grid' : 'grid';

  function renderCard(entry, cardClass, tabId) {
    const prefix = fieldPrefix(cardClass);
    const card = document.createElement('div');
    card.className = cardClass;
    for (const field of ['hanzi', 'pinyin', 'meaning']) {
      const el = document.createElement('div');
      el.className = prefix + field;
      el.textContent = t(entry[field]);
      card.appendChild(el);
    }
    const icon = document.createElement('div');
    icon.className = 'speaker';
    icon.innerHTML = SPEAKER_SVG;
    card.appendChild(icon);

    card.dataset.search = [entry.hanzi, entry.pinyin, t(entry.meaning)].join(' ').toLowerCase();

    const star = document.createElement('button');
    star.type = 'button';
    star.className = 'favorite-btn' + (isFavorite(tabId, entry.hanzi) ? ' active' : '');
    star.setAttribute('aria-label', 'Toggle favorite');
    star.innerHTML = STAR_SVG;
    star.addEventListener('click', e => {
      e.stopPropagation();
      toggleFavorite(tabId, entry.hanzi);
      star.classList.toggle('active');
      refreshFavoritesPanel();
    });
    card.appendChild(star);
    return card;
  }

  function renderTabs(tabs, container) {
    tabs.forEach((tab, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (i === 0 ? ' active' : '');
      btn.dataset.tab = tab.id;
      btn.setAttribute('role', 'tab');
      const hanzi = document.createElement('span');
      hanzi.className = 'tab-hanzi';
      hanzi.textContent = tab.hanziLabel;
      btn.appendChild(hanzi);
      btn.appendChild(document.createTextNode(t(tab.label)));
      container.appendChild(btn);
    });
  }

  function renderSection(sec, cardClass, tabId, collapsible = false) {
    const section = document.createElement('div');
    section.className = 'section';
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = t(sec.title);
    if (collapsible && sec.title) {
      if (isCollapsed(tabId, sec.title)) section.classList.add('is-collapsed');
      title.insertAdjacentHTML('beforeend', CHEVRON_SVG);
      title.addEventListener('click', () => {
        toggleCollapse(tabId, sec.title);
        section.classList.toggle('is-collapsed');
      });
    }
    const grid = document.createElement('div');
    grid.className = gridClass(cardClass);
    sec.entries.forEach(entry => grid.appendChild(renderCard(entry, cardClass, tabId)));
    section.append(title, grid);
    return section;
  }

  function renderSubsection(sub, cardClass, tabId) {
    const wrap = document.createElement('div');
    wrap.className = 'subsection';
    if (sub.title) {
      if (isCollapsed(tabId, sub.title)) wrap.classList.add('is-collapsed');
      const title = document.createElement('div');
      title.className = 'subsection-title';
      title.textContent = t(sub.title);
      title.insertAdjacentHTML('beforeend', CHEVRON_SVG);
      title.addEventListener('click', () => {
        toggleCollapse(tabId, sub.title);
        wrap.classList.toggle('is-collapsed');
      });
      wrap.appendChild(title);
    }
    sub.sections.forEach(sec => wrap.appendChild(renderSection(sec, cardClass, tabId)));
    return wrap;
  }

  function renderAppCard(entry, tabId) {
    const card = document.createElement('div');
    card.className = 'app-card';
    const icon = document.createElement('div');
    icon.className = 'app-icon';
    icon.textContent = entry.icon || '📱';
    const content = document.createElement('div');
    content.className = 'app-content';
    const nameRow = document.createElement('div');
    nameRow.className = 'app-name-row';
    const name = document.createElement('span');
    name.className = 'app-name';
    name.textContent = entry.name;
    nameRow.appendChild(name);
    const hanzi = document.createElement('span');
    hanzi.className = 'app-hanzi';
    hanzi.textContent = entry.hanzi;
    nameRow.appendChild(hanzi);
    const pinyin = document.createElement('div');
    pinyin.className = 'app-pinyin';
    pinyin.textContent = entry.pinyin;
    const desc = document.createElement('div');
    desc.className = 'app-desc';
    desc.textContent = t(entry.description);
    content.append(nameRow, pinyin, desc);
    card.append(icon, content);
    card.dataset.search = [entry.hanzi, entry.pinyin, entry.name, t(entry.description)].join(' ').toLowerCase();
    return card;
  }

  function renderAppIntro(introText, container) {
    const intro = document.createElement('div');
    intro.className = 'app-intro';
    intro.textContent = t(introText);
    container.appendChild(intro);
  }

  function renderFavoritesContent(container) {
    let total = 0;
    if (contentData) {
      contentData.tabs.forEach(tab => {
        if (tab.id === 'favorites') return;
        const groups = tab.subsections || [{ sections: tab.sections }];
        const entries = [];
        groups.forEach(g => g.sections.forEach(s => s.entries.forEach(e => {
          if (isFavorite(tab.id, e.hanzi)) entries.push(e);
        })));
        if (!entries.length) return;
        total += entries.length;
        const section = document.createElement('div');
        section.className = 'section';
        const title = document.createElement('div');
        title.className = 'subsection-title';
        title.textContent = t(tab.label);
        const grid = document.createElement('div');
        grid.className = gridClass(tab.cardClass);
        entries.forEach(e => grid.appendChild(renderCard(e, tab.cardClass, tab.id)));
        section.append(title, grid);
        container.appendChild(section);
      });
    }
    if (!total) {
      const empty = document.createElement('div');
      empty.className = 'favorites-empty';
      empty.textContent = t(CHROME.favoritesEmpty);
      container.appendChild(empty);
    }
  }

  function refreshFavoritesPanel() {
    const content = document.getElementById('favorites-content');
    if (!content) return;
    content.innerHTML = '';
    renderFavoritesContent(content);
    content.querySelectorAll('.card, .phrase-card').forEach(card => {
      card.addEventListener('click', () => {
        const hanziEl = card.querySelector('.hanzi, .phrase-hanzi');
        speak(hanziEl.textContent.trim(), card);
      });
    });
  }

  function renderPanels(tabs, container) {
    tabs.forEach((tab, i) => {
      const panel = document.createElement('div');
      panel.className = 'tab-panel' + (i === 0 ? ' active' : '');
      panel.id = 'tab-' + tab.id;
      if (tab.id === 'favorites') {
        renderFavoritesContent(panel);
      } else if (tab.cardClass === 'app-card' && tab.intro) {
        renderAppIntro(tab.intro, panel);
        tab.sections.forEach(sec => {
          const section = document.createElement('div');
          section.className = 'section';
          const title = document.createElement('div');
          title.className = 'section-title';
          title.textContent = t(sec.title);
          const grid = document.createElement('div');
          grid.className = 'app-grid';
          sec.entries.forEach(entry => grid.appendChild(renderAppCard(entry, tab.id)));
          section.append(title, grid);
          panel.appendChild(section);
        });
      } else if (tab.subsections) {
        tab.subsections.forEach(sub => panel.appendChild(renderSubsection(sub, tab.cardClass, tab.id)));
      } else {
        tab.sections.forEach(sec => panel.appendChild(renderSection(sec, tab.cardClass, tab.id, true)));
      }
      container.appendChild(panel);
    });
    container.appendChild(renderFavoritesOverlay());
  }

  function renderFavoritesOverlay() {
    const overlay = document.createElement('div');
    overlay.className = 'favorites-overlay';
    overlay.id = 'favorites-overlay';
    overlay.innerHTML = '<div class="favorites-panel"><div class="favorites-header"><h2>收藏</h2><button class="fav-close" aria-label="Close">✕</button></div><div class="favorites-content" id="favorites-content"></div></div>';
    return overlay;
  }

  function showFavorites() {
    const overlay = document.getElementById('favorites-overlay');
    const content = document.getElementById('favorites-content');
    content.innerHTML = '';
    renderFavoritesContent(content);
    overlay.classList.add('active');
    document.body.classList.add('fav-open');
    content.querySelectorAll('.card, .phrase-card').forEach(card => {
      card.addEventListener('click', () => {
        const hanziEl = card.querySelector('.hanzi, .phrase-hanzi');
        speak(hanziEl.textContent.trim(), card);
      });
    });
  }

  function hideFavorites() {
    const overlay = document.getElementById('favorites-overlay');
    overlay.classList.remove('active');
    document.body.classList.remove('fav-open');
  }

  function applyChrome() {
    document.documentElement.lang = currentLang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (CHROME[key]) el.textContent = CHROME[key][currentLang];
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const key = el.dataset.i18nHtml;
      if (CHROME[key]) el.innerHTML = CHROME[key][currentLang];
    });
    document.querySelectorAll('.lang-switch button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
    const si = document.getElementById('searchInput');
    if (si) si.placeholder = CHROME.searchPlaceholder[currentLang];
  }

  function rerenderContent() {
    if (!contentData) return;
    const tabsContainer = document.getElementById('tabs');
    const panelsContainer = document.getElementById('panels');
    const activeTab = document.querySelector('.tab.active');
    const activeId = activeTab ? activeTab.dataset.tab : contentData.tabs[0].id;
    tabsContainer.innerHTML = '';
    panelsContainer.innerHTML = '';
    renderTabs(contentData.tabs, tabsContainer);
    renderPanels(contentData.tabs, panelsContainer);
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeId));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + activeId));
    wireTabs();
    wireCards();
  }

  function setLang(lang) {
    if (!SUPPORTED_LANGS.includes(lang) || lang === currentLang) return;
    currentLang = lang;
    try { localStorage.setItem('lang', lang); } catch (e) {}
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    document.querySelectorAll('.speaking').forEach(el => el.classList.remove('speaking'));
    applyChrome();
    rerenderContent();
    const si = document.getElementById('searchInput');
    if (si && si.value) filterCards(si.value);
  }

  document.querySelectorAll('.lang-switch button').forEach(btn => {
    btn.addEventListener('click', () => setLang(btn.dataset.lang));
  });

  const themeBtn = document.getElementById('themeBtn');
  if (themeBtn) {
    themeBtn.textContent = currentTheme === 'dark' ? '☀︎' : '☾';
    themeBtn.addEventListener('click', () => setTheme(currentTheme === 'dark' ? 'light' : 'dark'));
  }

  const pinyinBtn = document.getElementById('pinyinBtn');
  if (pinyinBtn) {
    pinyinBtn.classList.toggle('active', pinyinHidden);
    pinyinBtn.addEventListener('click', () => setPinyinMode(!pinyinHidden));
  }

  applyChrome();

  document.getElementById('favBtn').addEventListener('click', showFavorites);
  document.addEventListener('click', e => {
    if (e.target.classList.contains('favorites-overlay') || e.target.classList.contains('fav-close')) {
      hideFavorites();
    }
  });

  function filterCards(query) {
    const q = query.trim().toLowerCase();
    const activePanel = document.querySelector('.tab-panel.active');
    if (!activePanel) return;
    activePanel.classList.toggle('search-active', !!q);
    activePanel.querySelectorAll('.card, .phrase-card, .app-card').forEach(card => {
      card.style.display = (!q || card.dataset.search.includes(q)) ? '' : 'none';
    });
    activePanel.querySelectorAll('.section').forEach(section => {
      const any = [...section.querySelectorAll('.card, .phrase-card, .app-card')].some(c => c.style.display !== 'none');
      section.style.display = any ? '' : 'none';
    });
    activePanel.querySelectorAll('.subsection').forEach(sub => {
      const any = [...sub.querySelectorAll('.section')].some(s => s.style.display !== 'none');
      sub.style.display = any ? '' : 'none';
    });
  }

  function wireTabs() {
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach(t => t.classList.toggle('active', t === tab));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + target));
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        document.querySelectorAll('.speaking').forEach(el => el.classList.remove('speaking'));
        const si = document.getElementById('searchInput');
        if (si) si.value = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  // TTS
  const synth = window.speechSynthesis;
  let zhVoice = null;
  function pickVoice() {
    const voices = synth ? synth.getVoices() : [];
    zhVoice = voices.find(v => v.lang === 'zh-CN')
           || voices.find(v => v.lang.startsWith('zh-CN'))
           || voices.find(v => v.lang.startsWith('zh'))
           || null;
  }
  pickVoice();
  if (synth && speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = pickVoice;
  }

  let currentCard = null;
  function speak(text, card) {
    if (!synth) {
      alert('Text-to-speech is not supported in this browser.');
      return;
    }
    synth.cancel();
    if (currentCard) currentCard.classList.remove('speaking');

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'zh-CN';
    if (zhVoice) utter.voice = zhVoice;
    utter.rate = 0.85;
    utter.pitch = 1;

    utter.onstart = () => {
      card.classList.add('speaking');
      currentCard = card;
    };
    utter.onend = utter.onerror = () => {
      card.classList.remove('speaking');
      if (currentCard === card) currentCard = null;
    };

    synth.speak(utter);
  }

  function wireCards() {
    document.querySelectorAll('.card, .phrase-card').forEach(card => {
      card.addEventListener('click', () => {
        const hanziEl = card.querySelector('.hanzi, .phrase-hanzi');
        speak(hanziEl.textContent.trim(), card);
      });
    });
  }

  // Fetch content and render
  fetch('./content.json')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      contentData = data;
      renderTabs(data.tabs, document.getElementById('tabs'));
      renderPanels(data.tabs, document.getElementById('panels'));
      wireTabs();
      wireCards();
    })
    .catch(err => {
      const panels = document.getElementById('panels');
      const msg = document.createElement('div');
      msg.className = 'load-error';
      msg.textContent = currentLang === 'it'
        ? 'Impossibile caricare i contenuti. Riconnettiti e aggiorna.'
        : 'Failed to load content. Please reconnect and refresh.';
      panels.appendChild(msg);
      console.error('content load failed:', err);
    });

  document.getElementById('searchInput').addEventListener('input', e => filterCards(e.target.value));

  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => {
        console.warn('SW registration failed:', err);
      });
    });
  }
</script>

</body>
</html>
